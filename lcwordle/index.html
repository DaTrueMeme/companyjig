<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../assets/fav.png">
    <script src="../scripts/elements.js" defer></script>
    <script src="script.js" defer></script>
    <title>Company Jig - LC Wordle</title>
</head>
<body>
    <div id="nav-container"></div>

    <div class="content">
        <h1>Lethal Company Wordle<img class="maneater" src="../assets/ManeaterHappy.png"></h1>
        <p>Try to guess todays Lethal Company scrap item!</p>
        <p class="funnyhaha">and no, the Maneater does not count as an item...</p>
        <p class="note">Resets at local midnight. Inspired by <a href="https://lcwordle.com/" target="_blank">lcworld.com</a></p>
    </div>

    <div id="game">
        <input type="text" id="guessInput" list="itemList" placeholder="Guess an item..." />
        <datalist id="itemList"></datalist>
        <button id="guessButton">Guess</button>

        <div id="guessCount">Guesses remaining: 5</div>

        <table id="resultsTable">
            <thead>
            <tr>
                <th>Item</th>
                <th>Avg Cost</th>
                <th>Weight</th>
                <th>Two-Handed</th>
                <th>Conductive</th>
                <th>Interactable</th>
                <th>Moon</th>
            </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>

        <div id="message"></div>
        <div id="nextReset"></div>
    </div>

    <div id="footer-container"></div>
</body>
</html>
