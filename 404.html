<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Jig - 404</title>
    <style>
        @font-face {
            font-family: 'Superchibby';
            src: url('/assets/font/SuperChiby.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Montserrat';
            src: url('/assets/font/MontserratRegular.ttf') format('truetype');
        }

        body {
            background-color: #8aa1ff;
            background-image: url("/assets/background.png");
            background-size: 45% auto;
            color: white;
            font-family: 'Montserrat';
            text-align: center;
        }

        img {
            width: 150px;
            transform: rotate(20deg) translateY(35px) translateX(10px);
        }

        h1 {
            font-size: 100px;
            font-family: 'Superchibby';
            text-shadow: 8px 8px 0px #000;
        }

        a {
            color: #ffffff;
            font-weight: bold;
            text-shadow: 0px 3px 0px #000;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>404 Unknown Page <img src="/assets/ManeaterSad.png"></h1>
    <p>We're sorry, the page you requested could not be found.</p>
    <a href="/">Return Home</a>
</body>
</html>
